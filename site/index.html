<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dice Roller</title>
    <style>
        h1 {
            color:#d7bc1a
        }
        h2 {
            color:#f1274c;
        }
        
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #282828;
            color: #ffffff;
        }
        input {
            padding: 8px;
            font-size: 16px;
            width: 80px;
        }
        button {
            padding: 8px 16px;
            font-size: 16px;
        }
        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #93c079;
        }
        .details {
            margin-top: 10px;
            font-size: 14px;
        }
        .roller-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }
        .roller-section {
            flex: 1;
            max-width: 300px;
        }
    </style>
</head>
<body>

<h1>Dice Roller</h1>

<!-- Create a container for the two sections: Hotness and Car. Each section will have its own input, button, and result display. -->
<div class="roller-container">
    <!-- Keep each section as the same class to maintain consistent styling -->
  <div class="roller-section">
    <h2>Hotness</h2>
    <!-- Use ids to differentiate the different fields, and make "hotness" and "car" arguments to the rollDice function. That way, all the math stays in a single function.-->
    <input type="number" id="diceCountHotness" min="1" placeholder="Dice #">
    <button onclick="rollDice('hotness')" type="submit">Roll</button>
    <!-- Create placeholder divs for the results to fill later-->
    <div id="resultHotness" class="result"></div>
    <div id="detailsHotness" class="details"></div>
  </div>

  <div class="roller-section">
    <h2>Car</h2>
    <input type="number" id="diceCountCar" min="1" placeholder="Dice #">
    <button onclick="rollDice('car')" type="submit">Roll</button>
    <div id="resultCar" class="result"></div>
    <div id="detailsCar" class="details"></div>
  </div>
</div>

<script>
function convertRoll(roll) {
    // Convert the roll to the appropriate value based on the rules.
    if (roll === 1) return -1;
    if (roll === 2 || roll === 3) return 0;
    if (roll === 4 || roll === 5) return 1;
    if (roll === 6) return 2;
}

function rollDice(type) {
    // Use in-line if statements to determine which fields to use based on the type argument.
    const diceCountId = type === 'hotness' ? 'diceCountHotness' : 'diceCountCar';
    const resultId = type === 'hotness' ? 'resultHotness' : 'resultCar';
    const detailsId = type === 'hotness' ? 'detailsHotness' : 'detailsCar';
    
    // Get the count of dice from the input field by Element ID.
    const count = parseInt(document.getElementById(diceCountId).value);
    if (isNaN(count) || count < 1) {
        alert("Please enter a valid positive integer.");
        return;
    }

    let total = 0;
    let rolls = [];

    // For loop to do the rolls.
    for (let i = 0; i < count; i++) {
        const roll = Math.floor(Math.random() * 6) + 1;
        const value = convertRoll(roll);
        rolls.push(`${roll}(${value})`);
        total += value;
    }

    // Update those empty divs with the results. Show the total and the details of each roll.
    document.getElementById(resultId).innerText = `Total: ${total}`;
    document.getElementById(detailsId).innerText = `Rolls: ${rolls.join(", ")}`;
}
</script>

</body>
</html>
